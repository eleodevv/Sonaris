name: iOS-ipa-build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Flutter pub get
        run: flutter pub get

      - name: Build iOS simulator (no codesign needed)
        run: flutter build ios --simulator --debug

      - name: Create IPA from simulator build
        run: |
          mkdir -p Payload
          mv Runner.app Payload/
          zip -qq -r -9 FlutterIpaExport.ipa Payload
        working-directory: build/ios/iphonesimulator

      - name: Upload IPA to release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: build/ios/iphonesimulator/FlutterIpaExport.ipa
          tag: v1.0
          allowUpdates: true
          body: "Sonaris App - Build simulador iOS"
